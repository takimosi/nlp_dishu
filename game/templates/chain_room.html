<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>画猜接龙 · 游戏中</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a18;
            --paper: #f5f0e8;
            --paper-dark: #ede8dc;
            --paper-line: #d4ccb8;
            --accent: #8b3a2a;
            --muted: #7a7468;
            --border: #c8c0aa;
            --success: #3a6b3a;
            --chain: #8b6914;
            --bezel: #121212;
            --plastic-light: #e0dbce;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(145deg, #2b221a 0%, #140f0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            padding: 16px;
        }

        .game-console {
            width: 1400px;
            max-width: 98vw;
            height: 94vh;
            min-height: 700px;
            background: linear-gradient(135deg, #ddd6c8 0%, #c2b9a6 100%);
            border-radius: 48px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,240,0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .console-header { background: linear-gradient(90deg, var(--chain), #8b6914, var(--chain)); height: 14px; flex-shrink: 0; }
        .console-body { background: var(--plastic-light); flex: 1; padding: 16px 24px; overflow: hidden; display: flex; flex-direction: column; }
        .screen-bezel { background: var(--bezel); border-radius: 24px; padding: 16px 20px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .crt-screen { background: #1e2a1a; border-radius: 16px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .game-content { flex: 1; padding: 1rem; background: var(--paper); overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

        /* 顶部状态栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .room-code-card {
            background: #f0e8d8;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--chain);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .room-code-value { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: bold; color: var(--chain); letter-spacing: 0.1em; }
        .copy-btn { background: var(--chain); color: white; border: none; padding: 4px 12px; border-radius: 40px; cursor: pointer; font-family: monospace; font-size: 12px; }
        .game-status-badge { background: var(--ink); color: white; padding: 6px 16px; border-radius: 40px; font-family: monospace; font-size: 14px; }

        /* 玩家列表 */
        .player-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 8px 0;
        }
        .player-tag {
            background: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid var(--border);
            font-family: monospace;
        }
        .player-tag.current { background: var(--chain); color: white; border-color: var(--chain); }
        .player-tag.host { background: #6a5010; color: white; }

        /* 当前任务卡片 */
        .task-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid var(--chain);
        }
        .task-label { font-size: 14px; color: var(--muted); font-family: monospace; margin-bottom: 10px; }
        .task-content { font-size: 28px; font-weight: bold; color: var(--ink); }
        .turn-hint { margin-top: 12px; font-size: 13px; color: var(--muted); }

        /* 上一个人提交的区域 */
        .last-submit {
            background: var(--paper-dark);
            border-radius: 16px;
            padding: 16px;
            border-left: 4px solid var(--chain);
        }
        .last-submit-title { font-size: 12px; color: var(--muted); font-family: monospace; margin-bottom: 8px; }
        .last-submit-content { font-size: 16px; color: var(--ink); }
        .last-submit-icons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .last-submit-icons img { max-width: 50px; max-height: 50px; border: 1px solid var(--border); border-radius: 8px; background: white; padding: 4px; }

        /* 图标库 */
        .icon-library {
            background: var(--paper-dark);
            border-radius: 16px;
            padding: 12px;
            margin-top: 8px;
        }
        .cat-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .cat-btn {
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: monospace;
            white-space: nowrap;
            color: #1a1a18;
        }
        .cat-btn.active { background: var(--chain); color: white; border-color: var(--chain); }
        .search-row { margin-bottom: 12px; }
        .search-row input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 14px;
            background: white;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .icon-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .icon-card:hover { transform: scale(0.96); border-color: var(--chain); background: #fff8e8; }
        .icon-card img { max-width: 50px; max-height: 50px; }
        .icon-card .label { font-size: 11px; margin-top: 6px; color: var(--muted); }

        .composed-area {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid var(--border);
        }
        .composed-icons { display: flex; gap: 10px; flex-wrap: wrap; min-height: 70px; }
        .composed-icon { position: relative; background: var(--paper-dark); border-radius: 8px; padding: 4px; }
        .composed-icon img { max-width: 50px; max-height: 50px; }
        .remove-icon {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            font-size: 12px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            margin: 10px 0;
            resize: vertical;
        }
        button {
            padding: 12px 28px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: var(--success); }

        .control-deck {
            background: #c9c0ae;
            margin-top: 12px;
            padding: 8px 20px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-link { font-family: monospace; font-size: 12px; color: #5f5542; text-decoration: none; }

        /* 结果弹窗 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-card {
            background: var(--paper);
            border-radius: 32px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .result-title { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--chain); }
        .result-compare {
            background: var(--paper-dark);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .result-original { font-size: 22px; color: var(--success); font-weight: bold; }
        .result-final { font-size: 22px; color: var(--accent); font-weight: bold; }
        .result-similarity { font-size: 18px; margin-top: 12px; }
        .result-similarity span { font-weight: bold; color: var(--chain); }
        .result-chain {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .result-chain-item {
            background: var(--paper-dark);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid var(--chain);
        }
        .result-chain-author { font-weight: bold; color: var(--chain); font-family: monospace; font-size: 13px; }
        .result-chain-content { margin-top: 6px; font-size: 14px; }
        .result-chain-icons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .result-chain-icons img { max-width: 40px; max-height: 40px; border-radius: 6px; background: white; padding: 2px; }

        @media (max-width: 900px) {
            .console-body { padding: 12px; }
            .icon-grid { max-height: 150px; }
            .task-content { font-size: 22px; }
        }
    </style>
</head>

const iconDB = new Map();
for (const [file, label, category] of RAW_ICONS) {
    const padded = file.padStart(6, '0');
    if (!iconDB.has(padded)) {
        iconDB.set(padded, { file: padded, label, category });
    }
}

const CATEGORIES = ['全部', '时间', '人物动作', '地点场所', '交通出行', '方向箭头', '数字符号', '科技设备', '情感表达', '饮食', '自然天气'];

function getImageUrl(file) {
    return `http://localhost:8080/Boook/auto_cut_segments/${file}.jpg`;
}

function backToWorld() {
    window.location.href = 'http://localhost:8080/index.html';
}

// ==================== 页面渲染 ====================
let currentState = null;

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    roomCode = urlParams.get('room');
    playerId = urlParams.get('player');
    playerName = decodeURIComponent(urlParams.get('name') || '玩家');
    if (!roomCode || !playerId) {
        window.location.href = 'chain_lobby.html';
        return;
    }
    document.getElementById('gameContent').innerHTML = renderGame();
    document.getElementById('roomCodeDisplay').innerText = roomCode;

    pollInterval = setInterval(pollRoom, 1500);
    await pollRoom();
}

function renderGame() {
    return `
        <div class="top-bar">
            <div class="room-code-card">
                <span>房间号</span>
                <span class="room-code-value" id="roomCodeDisplay">---</span>
                <button class="copy-btn" onclick="copyRoomCode()">复制</button>
            </div>
            <div class="game-status-badge" id="statusBadge">加载中...</div>
        </div>
        <div class="player-list" id="playerList"></div>
        <div id="taskArea"></div>
        <div id="lastSubmitArea" style="display:none;"></div>
        <div id="actionArea" style="display:none;">
            <div class="icon-library">
                <div class="cat-row" id="catRow"></div>
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="搜索图标..." oninput="onSearch()">
                </div>
                <div class="icon-grid" id="iconGrid"></div>
            </div>
            <div class="composed-area">
                <div style="font-size:14px; margin-bottom:8px; font-weight:bold;">你的图标序列</div>
                <div class="composed-icons" id="composedIcons"></div>
                <button id="submitBtn" onclick="submitAction()" style="margin-top:12px;">提交</button>
            </div>
        </div>
        <div id="guessArea" style="display:none;">
            <textarea id="guessInput" rows="2" placeholder="用一句话描述你看到的图标序列..."></textarea>
            <button id="guessSubmitBtn" onclick="submitGuess()">提交</button>
        </div>
        <button onclick="leaveRoom()" style="margin-top:12px;">离开房间</button>
    `;
}

function copyRoomCode() {
    const code = document.getElementById('roomCodeDisplay').innerText;
    if (code && code !== '---') {
        navigator.clipboard.writeText(code);
        alert('房间码已复制：' + code);
    }
}

function onSearch() {
    const input = document.getElementById('searchInput');
    searchKeyword = input ? input.value.toLowerCase().trim() : '';
    renderIconGrid();
}

function renderCategories() {
    const container = document.getElementById('catRow');
    if (!container) return;
    container.innerHTML = '';
    CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
            currentCategory = cat;
            renderCategories();
            renderIconGrid();
        };
        container.appendChild(btn);
    });
}

function renderIconGrid() {
    const container = document.getElementById('iconGrid');
    if (!container) return;
    container.innerHTML = '';

    let icons = Array.from(iconDB.values());
    if (currentCategory !== '全部') {
        icons = icons.filter(ic => ic.category === currentCategory);
    }
    if (searchKeyword) {
        icons = icons.filter(ic => ic.label.toLowerCase().includes(searchKeyword) || ic.category.toLowerCase().includes(searchKeyword));
    }
    icons.sort((a,b) => a.label.localeCompare(b.label));

    for (const icon of icons.slice(0, 80)) {
        const card = document.createElement('div');
        card.className = 'icon-card';
        card.onclick = () => addToCompose(icon);
        card.innerHTML = `<img src="${getImageUrl(icon.file)}" onerror="this.style.display='none'"><div class="label">${icon.label}</div>`;
        container.appendChild(card);
    }
    if (icons.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--muted);">没有找到图标</div>';
    }
}

function addToCompose(icon) {
    composedIconsList.push({ ...icon });
    renderComposedIcons();
}

function removeFromCompose(idx) {
    composedIconsList.splice(idx, 1);
    renderComposedIcons();
}

function renderComposedIcons() {
    const container = document.getElementById('composedIcons');
    if (!container) return;
    container.innerHTML = '';
    if (composedIconsList.length === 0) {
        container.innerHTML = '<div style="color:var(--muted); font-size:14px;">点击上方图标添加到序列...</div>';
        return;
    }
    composedIconsList.forEach((icon, idx) => {
        const div = document.createElement('div');
        div.className = 'composed-icon';
        div.innerHTML = `<img src="${getImageUrl(icon.file)}"><div class="remove-icon" onclick="event.stopPropagation();removeFromCompose(${idx})">×</div>`;
        container.appendChild(div);
    });
}

async function submitAction() {
    if (composedIconsList.length === 0) {
        alert('请先选择图标');
        return;
    }
    const resp = await fetch(`${API_BASE}/api/room/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            room_code: roomCode,
            player_id: playerId,
            action: 'draw',
            content: composedIconsList
        })
    });
    const data = await resp.json();
    if (data.success) {
        composedIconsList = [];
        renderComposedIcons();
        alert('提交成功！');
        await pollRoom();
    } else {
        alert(data.error || '提交失败');
    }
}

async function submitGuess() {
    const guess = document.getElementById('guessInput').value.trim();
    if (!guess) {
        alert('请输入你的猜测');
        return;
    }
    const resp = await fetch(`${API_BASE}/api/room/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            room_code: roomCode,
            player_id: playerId,
            action: 'guess',
            content: guess
        })
    });
    const data = await resp.json();
    if (data.success) {
        savedGuess = '';
        document.getElementById('guessInput').value = '';
        alert('提交成功！');
        await pollRoom();
    } else {
        alert(data.error || '提交失败');
    }
}

async function leaveRoom() {
    if (roomCode && playerId) {
        await fetch(`${API_BASE}/api/room/leave`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_code: roomCode, player_id: playerId })
        });
    }
    if (pollInterval) clearInterval(pollInterval);
    window.location.href = 'chain_lobby.html';
}

// ==================== 轮询和UI更新 ====================
async function pollRoom() {
    try {
        const resp = await fetch(`${API_BASE}/api/room/state?room_code=${roomCode}&player_id=${playerId}`);
        const data = await resp.json();
        if (data.success) {
            updateUI(data.state);
            if (data.state.status === 'finished') {
                clearInterval(pollInterval);
                showResult(data.state);
            }
        } else if (data.error === '房间不存在') {
            clearInterval(pollInterval);
            alert('房间已关闭');
            window.location.href = 'chain_lobby.html';
        }
    } catch(e) {
        console.error('轮询失败', e);
    }
}

function updateUI(state) {
    currentState = state;

    // 更新玩家列表
    const playerList = document.getElementById('playerList');
    if (playerList) {
        playerList.innerHTML = '';
        state.players.forEach(p => {
            const tag = document.createElement('span');
            tag.className = 'player-tag';
            if (p.id === playerId) tag.classList.add('current');
            if (p.name === state.host) tag.classList.add('host');
            tag.textContent = p.name;
            playerList.appendChild(tag);
        });
    }

    // 更新状态徽章
    const statusBadge = document.getElementById('statusBadge');
    if (statusBadge) {
        if (state.status === 'waiting') statusBadge.textContent = '等待中';
        else if (state.status === 'playing') statusBadge.textContent = '游戏中';
        else statusBadge.textContent = '已结束';
    }

    // 显示开始按钮（房主专用）
    const existingStartBtn = document.getElementById('startBtnArea');
    if (state.status === 'waiting' && state.host === playerName && state.players.length >= 2) {
        if (!existingStartBtn) {
            const startDiv = document.createElement('div');
            startDiv.id = 'startBtnArea';
            startDiv.style.textAlign = 'center';
            startDiv.style.margin = '10px 0';
            startDiv.innerHTML = '<button onclick="startGame()" class="btn-success" style="font-size:16px; padding:12px 24px;">开始游戏</button>';
            const taskArea = document.getElementById('taskArea');
            if (taskArea) taskArea.parentNode.insertBefore(startDiv, taskArea);
        }
    } else if (existingStartBtn) {
        existingStartBtn.remove();
    }

    // 游戏进行中的UI
    const taskArea = document.getElementById('taskArea');
    const actionArea = document.getElementById('actionArea');
    const guessArea = document.getElementById('guessArea');
    const lastSubmitArea = document.getElementById('lastSubmitArea');

    if (state.status === 'playing') {
        const isMyTurn = state.is_my_turn;

        // ========== 显示当前任务 ==========
        if (taskArea) {
            if (isMyTurn) {
                // 当前玩家：显示具体任务
                const isLastRound = (state.chain.length + 1) >= state.total_rounds;
                const taskDesc = state.current_task === 'draw' ? '画图阶段' : '猜图阶段';
                const finalHint = isLastRound && state.current_task === 'guess' ? '（最终回合）' : '';
                taskArea.innerHTML = `
                    <div class="task-card">
                        <div class="task-label">你的回合 · ${taskDesc}${finalHint}</div>
                        <div class="task-content">${state.current_prompt || '等待中...'}</div>
                    </div>
                `;
            } else {
                // 其他玩家：只显示等待
                taskArea.innerHTML = `
                    <div class="task-card">
                        <div class="task-label">游戏中</div>
                        <div class="task-content">等待其他玩家...</div>
                    </div>
                `;
            }
        }

        // ========== 显示上一个人的提交（只有轮到的人能看到） ==========
        if (lastSubmitArea) {
            if (isMyTurn && state.last_item && state.last_item.author !== playerName) {
                // 只有轮到的人，且上一个人不是自己，才显示上一个人的内容
                let lastHtml = '';
                if (state.last_item.type === 'draw') {
                    const icons = state.last_item.content || [];
                    lastHtml = `<div class="last-submit">
                        <div class="last-submit-title">上一个人画的图标：</div>
                        <div class="last-submit-icons">${icons.map(ic => `<img src="${getImageUrl(ic.file)}" title="${ic.label}">`).join('')}</div>
                    </div>`;
                } else if (state.last_item.type === 'guess') {
                    lastHtml = `<div class="last-submit">
                        <div class="last-submit-title">上一个人猜的内容：</div>
                        <div class="last-submit-content">「${escapeHtml(state.last_item.content)}」</div>
                    </div>`;
                }
                lastSubmitArea.innerHTML = lastHtml;
                lastSubmitArea.style.display = 'block';
            } else {
                lastSubmitArea.style.display = 'none';
            }
        }

        // ========== 显示操作区 ==========
        if (state.current_task === 'draw' && state.is_my_turn) {
            if (actionArea) actionArea.style.display = 'block';
            if (guessArea) guessArea.style.display = 'none';
            renderCategories();
            renderIconGrid();
        } else if (state.current_task === 'guess' && state.is_my_turn) {
            if (actionArea) actionArea.style.display = 'none';
            if (guessArea) guessArea.style.display = 'block';
            const guessInput = document.getElementById('guessInput');
            if (guessInput && savedGuess) {
                guessInput.value = savedGuess;
            }
            if (guessInput) {
                guessInput.oninput = (e) => { savedGuess = e.target.value; };
            }
        } else {
            if (actionArea) actionArea.style.display = 'none';
            if (guessArea) guessArea.style.display = 'none';
        }
    } else {
        if (taskArea) taskArea.innerHTML = '';
        if (actionArea) actionArea.style.display = 'none';
        if (guessArea) guessArea.style.display = 'none';
        if (lastSubmitArea) lastSubmitArea.style.display = 'none';
    }
}
async function startGame() {
    const resp = await fetch(`${API_BASE}/api/room/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_code: roomCode, player_id: playerId })
    });
    const data = await resp.json();
    if (!data.success) {
        alert(data.error || '开始失败');
    } else {
        await pollRoom();
    }
}

function showResult(state) {
    const original = state.original_prompt || '?';
    let finalGuess = '?';
    for (let i = state.chain.length - 1; i >= 0; i--) {
        if (state.chain[i].type === 'guess') {
            finalGuess = state.chain[i].content;
            break;
        }
    }

    const similarity = state.final_score ? Math.round(state.final_score * 100) : 0;

    // 构建完整链条HTML
    let chainHtml = '';
    for (let i = 1; i < state.chain.length; i++) {
        const item = state.chain[i];
        if (item.type === 'draw') {
            const icons = item.content || [];
            chainHtml += `
                <div class="result-chain-item">
                    <div class="result-chain-author">${escapeHtml(item.author)} 画图</div>
                    <div class="result-chain-icons">${icons.map(ic => `<img src="${getImageUrl(ic.file)}" title="${ic.label}">`).join('')}</div>
                </div>
            `;
        } else if (item.type === 'guess') {
            chainHtml += `
                <div class="result-chain-item">
                    <div class="result-chain-author">${escapeHtml(item.author)} 猜图</div>
                    <div class="result-chain-content">「${escapeHtml(item.content)}」</div>
                </div>
            `;
        }
    }

    const overlay = document.createElement('div');
    overlay.className = 'result-overlay';
    overlay.innerHTML = `
        <div class="result-card">
            <div class="result-title">游戏结束</div>
            <div class="result-compare">
                <div style="margin-bottom:12px;">原始词语</div>
                <div class="result-original">${escapeHtml(original)}</div>
                <div style="margin:20px 0;">传话后</div>
                <div class="result-final">${escapeHtml(finalGuess)}</div>
                <div class="result-similarity">语义相似度：<span>${similarity}%</span></div>
            </div>
            <div class="result-chain">
                <div style="font-weight:bold; margin-bottom:10px;">完整接龙链条</div>
                ${chainHtml}
            </div>
            <div style="text-align:center; margin-top:24px;">
                <button onclick="closeResultAndLeave()" style="background:var(--chain); padding:12px 28px;">返回大厅</button>
            </div>
        </div>
    `;

    document.body.appendChild(overlay);
}

function closeResultAndLeave() {
    const overlay = document.querySelector('.result-overlay');
    if (overlay) overlay.remove();
    leaveRoom();
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

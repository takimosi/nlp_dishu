<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>符号解密者 · 单人游戏</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a18;
            --paper: #f5f0e8;
            --paper-dark: #ede8dc;
            --paper-line: #d4ccb8;
            --accent: #8b3a2a;
            --accent-light: #c4604a;
            --muted: #7a7468;
            --border: #c8c0aa;
            --success: #3a6b3a;
            --detective: #2c5f8a;
            --bezel: #121212;
            --plastic-light: #e0dbce;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(145deg, #2b221a 0%, #140f0a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            padding: 16px;
        }

        .game-console {
            width: 1000px;
            max-width: 95vw;
            height: 92vh;
            min-height: 650px;
            background: linear-gradient(135deg, #ddd6c8 0%, #c2b9a6 100%);
            border-radius: 48px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,240,0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .console-header { background: linear-gradient(90deg, var(--detective), #2c5f8a, var(--detective)); height: 14px; flex-shrink: 0; }
        .console-body { background: var(--plastic-light); flex: 1; padding: 16px 24px; overflow: hidden; display: flex; flex-direction: column; }
        .screen-bezel { background: var(--bezel); border-radius: 24px; padding: 16px 20px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .crt-screen { background: #1e2a1a; border-radius: 16px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .game-content { flex: 1; padding: 1.2rem; background: var(--paper); overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .game-title {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: bold;
            color: var(--detective);
            letter-spacing: 0.1em;
        }
        .game-stats {
            display: flex;
            gap: 20px;
            background: var(--paper-dark);
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 14px;
        }
        .stat { color: var(--muted); }
        .stat-value { color: var(--detective); font-weight: bold; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-panel {
            background: var(--paper-dark);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .question-title {
            font-size: 14px;
            color: var(--muted);
            font-family: monospace;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 16px;
            color: var(--ink);
        }

        .icons-display {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 2px solid var(--border);
        }
        .meaning-text {
            font-size: 18px;
            font-weight: bold;
            color: var(--detective);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border);
            font-family: 'Noto Serif SC', serif;
        }
        .icons-sequence {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100px;
        }
        .icon-item img {
            max-width: 80px;
            max-height: 80px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: white;
            padding: 6px;
            object-fit: contain;
        }

        .options-2grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .option-card {
            background: white;
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .option-card:hover {
            transform: translateY(-3px);
            border-color: var(--detective);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }
        .option-card.selected {
            border-color: var(--detective);
            background: #e8f0f5;
        }
        .option-label {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: bold;
            color: var(--detective);
            margin-bottom: 12px;
        }
        .option-desc {
            font-size: 14px;
            color: var(--ink);
        }

        .feedback-panel {
            background: var(--paper-dark);
            border-radius: 16px;
            padding: 12px 16px;
            text-align: center;
        }
        .feedback-correct {
            color: var(--success);
            font-weight: bold;
        }
        .feedback-wrong {
            color: var(--accent);
            font-weight: bold;
        }
        .feedback-info {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
        }

        .next-btn {
            background: var(--detective);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
        }
        .next-btn:hover { background: #1e4a6e; }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-card {
            background: var(--paper);
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        .result-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: var(--detective); }
        .result-score { font-size: 48px; font-weight: bold; color: var(--success); margin: 20px 0; }
        .result-detail { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
        .restart-btn {
            background: var(--detective);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
        }

        .control-deck {
            background: #c9c0ae;
            margin-top: 12px;
            padding: 8px 20px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-link { font-family: monospace; font-size: 12px; color: #5f5542; text-decoration: none; }

        @media (max-width: 700px) {
            .icon-item { width: 70px; }
            .icon-item img { max-width: 55px; max-height: 55px; }
            .meaning-text { font-size: 14px; }
            .options-2grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div style="position:fixed; top:15px; left:15px; z-index:9999;">
  <button onclick="backToWorld()" style="background:rgba(0,0,0,0.7); border:1px solid #c09040; color:#c09040; padding:8px 16px; border-radius:30px; cursor:pointer; font-family:monospace; font-size:12px;">
    ← 返回地书世界
  </button>
</div>

<div class="game-console">
    <div class="console-header"></div>
    <div class="console-body">
        <div class="screen-bezel">
            <div class="crt-screen">
                <div class="game-content" id="gameContent">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>
        <div class="control-deck">
            <div class="console-brand" style="font-family:monospace; font-size:13px;">符号解密者 · 单人游戏</div>
            <a href="index.html" class="back-link">← 返回模式选择</a>
        </div>
    </div>
</div>

<script>
// ==================== 游戏配置 ====================
const TOTAL_ROUNDS = 10;
let gameQuestions = [];
let currentRound = 0;
let currentIcons = [];
let currentSeq = [];
let currentMeaning = '';
let currentIsTampered = false;
let currentTamperDesc = '';
let currentTamperType = '';
let currentOriginalSeq = [];
let score = 0;
let combo = 0;
let selectedAnswer = null;
let canSelect = true;
let gameFinished = false;

const TAMPER_TYPES = [
    { name: '替换图标', baseScore: 100, comboBonus: 20 },
    { name: '交换位置', baseScore: 150, comboBonus: 30 },
    { name: '增减图标', baseScore: 200, comboBonus: 40 }
];

// ==================== 工具函数 ====================
function segToFilename(seg) {
    let num = seg.replace('seg_', '');
    return num + '.jpg';
}

function getImageUrl(seg) {
    let filename = segToFilename(seg);
    return `../auto_cut_segments/${filename}`;
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// ==================== 题库加载 ====================
async function loadGameQuestions() {
    try {
        const response = await fetch('../game_final.json');
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        console.log('加载题目成功，共', data.questions?.length, '题');
        return data.questions || [];
    } catch(e) {
        console.error('加载题库失败', e);
        return [];
    }
}

// ==================== 篡改函数 ====================
function tamperReplace(originalSeq) {
    if (originalSeq.length === 0) return { seq: [...originalSeq], desc: '替换了一个图标' };
    const tampered = [...originalSeq];
    const pos = Math.floor(Math.random() * originalSeq.length);
    const otherPos = (pos + 1) % originalSeq.length;
    if (otherPos !== pos) {
        tampered[pos] = originalSeq[otherPos];
    }
    return { seq: tampered, desc: `替换了第${pos+1}个图标` };
}

function tamperSwap(originalSeq) {
    if (originalSeq.length < 2) return { seq: [...originalSeq], desc: '交换了图标位置' };
    const tampered = [...originalSeq];
    const pos1 = Math.floor(Math.random() * originalSeq.length);
    let pos2 = Math.floor(Math.random() * originalSeq.length);
    while (pos2 === pos1) pos2 = Math.floor(Math.random() * originalSeq.length);
    [tampered[pos1], tampered[pos2]] = [tampered[pos2], tampered[pos1]];
    return { seq: tampered, desc: `交换了第${pos1+1}和第${pos2+1}个图标的位置` };
}

function tamperLength(originalSeq) {
    const tampered = [...originalSeq];
    if (originalSeq.length <= 2 || Math.random() > 0.5) {
        tampered.push(originalSeq[0]);
        return { seq: tampered, desc: '增加了一个图标' };
    } else {
        const removePos = Math.floor(Math.random() * originalSeq.length);
        tampered.splice(removePos, 1);
        return { seq: tampered, desc: `删除了第${removePos+1}个图标` };
    }
}

// ==================== 生成一关 ====================
async function generateRound(questionBank) {
    if (!questionBank || questionBank.length === 0) {
        return null;
    }

    const template = questionBank[Math.floor(Math.random() * questionBank.length)];
    const originalSeq = template.seg_sequence || [];
    const originalMeaning = template.annotations?.pragmatic_meaning || '';

    if (originalSeq.length === 0) {
        return generateRound(questionBank);
    }

    // 随机决定是否篡改（约70%概率被篡改）
    const isTampered = Math.random() < 0.7;

    if (!isTampered) {
        return {
            icons: originalSeq,
            seq: originalSeq,
            meaning: originalMeaning,
            isTampered: false,
            tamperDesc: '',
            tamperType: null,
            originalSeq: originalSeq
        };
    }

    // 随机选择篡改类型
    const tamperType = TAMPER_TYPES[Math.floor(Math.random() * TAMPER_TYPES.length)];
    let result;

    switch (tamperType.name) {
        case '替换图标':
            result = tamperReplace(originalSeq);
            break;
        case '交换位置':
            result = tamperSwap(originalSeq);
            break;
        case '增减图标':
            result = tamperLength(originalSeq);
            break;
        default:
            result = { seq: [...originalSeq], desc: '无变化' };
    }

    return {
        icons: result.seq,
        seq: result.seq,
        meaning: originalMeaning,
        isTampered: true,
        tamperDesc: result.desc,
        tamperType: tamperType,
        originalSeq: originalSeq
    };
}

function renderGame() {
    const container = document.getElementById('gameContent');
    container.innerHTML = `
        <div class="top-bar">
            <div class="game-title">符号解密者</div>
            <div class="game-stats">
                <span class="stat">关卡: <span class="stat-value" id="roundDisplay">${currentRound + 1}/${TOTAL_ROUNDS}</span></span>
                <span class="stat">得分: <span class="stat-value" id="scoreDisplay">${score}</span></span>
                <span class="stat">连击: <span class="stat-value" id="comboDisplay">${combo}</span></span>
            </div>
        </div>

        <div class="game-area">
            <div class="question-panel">
                <div class="question-title">判断图标序列是否被篡改</div>
                <div class="question-text">观察下面的图标序列，判断它是否被篡改过</div>
            </div>

            <div class="icons-display">
                <div class="meaning-text" id="meaningText"></div>
                <div class="icons-sequence" id="iconsSequence"></div>
            </div>

            <div class="options-2grid" id="optionsGrid"></div>

            <div class="feedback-panel" id="feedbackPanel">
                <div id="feedbackMsg"></div>
                <button class="next-btn" id="nextBtn" style="display: none;">下一关</button>
            </div>
        </div>
    `;
}

function renderIcons() {
    const container = document.getElementById('iconsSequence');
    const meaningContainer = document.getElementById('meaningText');
    if (!container) return;

    // 显示语义描述
    if (meaningContainer && currentMeaning) {
        meaningContainer.textContent = currentMeaning;
    }

    container.innerHTML = '';
    currentIcons.forEach((seg, index) => {
        const iconItem = document.createElement('div');
        iconItem.className = 'icon-item';

        const img = document.createElement('img');
        img.src = getImageUrl(seg);
        img.alt = seg;
        img.onerror = function() {
            this.style.display = 'none';
        };

        iconItem.appendChild(img);
        container.appendChild(iconItem);
    });
}

function renderOptions() {
    const grid = document.getElementById('optionsGrid');
    if (!grid) return;

    grid.innerHTML = `
        <div class="option-card" id="optNormal" data-answer="normal">
            <div class="option-label">正常</div>
            <div class="option-desc">序列没有被篡改，是正确的</div>
        </div>
        <div class="option-card" id="optTampered" data-answer="tampered">
            <div class="option-label">被篡改</div>
            <div class="option-desc">序列被篡改了，存在异常</div>
        </div>
    `;

    const optNormal = document.getElementById('optNormal');
    const optTampered = document.getElementById('optTampered');

    if (selectedAnswer === 'normal') {
        optNormal.classList.add('selected');
    } else if (selectedAnswer === 'tampered') {
        optTampered.classList.add('selected');
    }

    optNormal.onclick = () => selectAnswer('normal');
    optTampered.onclick = () => selectAnswer('tampered');
}

function selectAnswer(answer) {
    if (!canSelect || gameFinished) return;

    selectedAnswer = answer;
    const isCorrect = (answer === 'tampered' && currentIsTampered) || (answer === 'normal' && !currentIsTampered);

    renderOptions();

    const feedbackDiv = document.getElementById('feedbackMsg');
    const nextBtn = document.getElementById('nextBtn');

    if (isCorrect) {
        let addScore = 0;
        if (currentIsTampered && currentTamperType) {
            addScore = currentTamperType.baseScore + (combo * currentTamperType.comboBonus);
            score += addScore;
            combo++;
        } else if (!currentIsTampered) {
            addScore = 50 + (combo * 10);
            score += addScore;
            combo++;
        } else {
            addScore = 50;
            score += addScore;
            combo++;
        }

        let scoreInfo = '';
        if (currentIsTampered && currentTamperType) {
            scoreInfo = `获得了 ${addScore} 分 (基础${currentTamperType.baseScore} + 连击${combo-1}×${currentTamperType.comboBonus})`;
        } else {
            scoreInfo = `获得了 ${addScore} 分 (正常序列 + 连击加成)`;
        }

        feedbackDiv.innerHTML = `
            <div class="feedback-correct">正确！</div>
            <div class="feedback-info">${scoreInfo}</div>
            ${currentIsTampered ? `<div class="feedback-info">篡改类型: ${currentTamperType?.name || '未知'}</div>` : ''}
            ${currentTamperDesc ? `<div class="feedback-info">异常详情: ${currentTamperDesc}</div>` : ''}
        `;
    } else {
        combo = 0;
        let extraInfo = '';
        if (currentIsTampered && currentOriginalSeq && currentOriginalSeq.length > 0) {
            extraInfo = `<div class="feedback-info">正确的序列应该是: ${currentMeaning}</div>`;
        }
        feedbackDiv.innerHTML = `
            <div class="feedback-wrong">错误！</div>
            <div class="feedback-info">${currentIsTampered ? '这个序列实际是被篡改过的' : '这个序列实际是正常的'}</div>
            ${currentIsTampered ? `<div class="feedback-info">篡改类型: ${currentTamperType?.name || '未知'}</div>` : ''}
            ${currentTamperDesc ? `<div class="feedback-info">异常详情: ${currentTamperDesc}</div>` : ''}
            ${extraInfo}
        `;
    }

    document.getElementById('scoreDisplay').innerText = score;
    document.getElementById('comboDisplay').innerText = combo;

    canSelect = false;
    nextBtn.style.display = 'block';
}

async function nextRound() {
    currentRound++;

    if (currentRound >= TOTAL_ROUNDS) {
        gameFinished = true;
        showResult();
        return;
    }

    selectedAnswer = null;
    canSelect = true;

    const round = await generateRound(gameQuestions);
    if (!round) {
        alert('加载题目失败，请刷新重试');
        return;
    }

    currentIcons = round.icons;
    currentSeq = round.seq;
    currentMeaning = round.meaning;
    currentIsTampered = round.isTampered;
    currentTamperDesc = round.tamperDesc || '';
    currentTamperType = round.tamperType;
    currentOriginalSeq = round.originalSeq || [];

    renderIcons();

    document.getElementById('roundDisplay').innerText = `${currentRound + 1}/${TOTAL_ROUNDS}`;
    document.getElementById('feedbackMsg').innerHTML = '';
    document.getElementById('nextBtn').style.display = 'none';

    renderOptions();
}

function showResult() {
    const maxScore = TOTAL_ROUNDS * 300;
    const percent = Math.round((score / maxScore) * 100);

    let grade = '';
    if (percent >= 80) grade = 'S级解密者';
    else if (percent >= 60) grade = 'A级解密者';
    else if (percent >= 40) grade = 'B级解密者';
    else grade = 'C级解密者';

    const overlay = document.createElement('div');
    overlay.className = 'result-overlay';
    overlay.innerHTML = `
        <div class="result-card">
            <div class="result-title">游戏通关</div>
            <div class="result-score">${score} 分</div>
            <div class="result-detail">通关评级: ${grade}</div>
            <div class="result-detail">正确率: ${Math.round((TOTAL_ROUNDS - (currentRound + 1 - TOTAL_ROUNDS)) / TOTAL_ROUNDS * 100)}%</div>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

async function restartGame() {
    const overlay = document.querySelector('.result-overlay');
    if (overlay) overlay.remove();

    currentRound = 0;
    score = 0;
    combo = 0;
    selectedAnswer = null;
    canSelect = true;
    gameFinished = false;

    const round = await generateRound(gameQuestions);
    if (!round) {
        alert('加载题目失败，请刷新重试');
        return;
    }

    currentIcons = round.icons;
    currentSeq = round.seq;
    currentMeaning = round.meaning;
    currentIsTampered = round.isTampered;
    currentTamperDesc = round.tamperDesc || '';
    currentTamperType = round.tamperType;
    currentOriginalSeq = round.originalSeq || [];

    renderGame();
    renderIcons();
    renderOptions();

    document.getElementById('roundDisplay').innerText = `1/${TOTAL_ROUNDS}`;
    document.getElementById('scoreDisplay').innerText = '0';
    document.getElementById('comboDisplay').innerText = '0';
}

function backToWorld() {
    window.location.href = 'http://localhost:8080/index.html';
}

// ==================== 游戏启动 ====================
async function init() {
    const container = document.getElementById('gameContent');
    container.innerHTML = '<div style="text-align:center;padding:40px;">加载题目中...</div>';

    gameQuestions = await loadGameQuestions();

    if (!gameQuestions || gameQuestions.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;">加载题目失败，请刷新页面重试</div>';
        return;
    }

    const round = await generateRound(gameQuestions);
    if (!round) {
        alert('加载题目失败');
        return;
    }

    currentIcons = round.icons;
    currentSeq = round.seq;
    currentMeaning = round.meaning;
    currentIsTampered = round.isTampered;
    currentTamperDesc = round.tamperDesc || '';
    currentTamperType = round.tamperType;
    currentOriginalSeq = round.originalSeq || [];

    renderGame();
    renderIcons();
    renderOptions();

    document.addEventListener('click', (e) => {
        if (e.target.id === 'nextBtn') {
            nextRound();
        }
    });
}

init();
</script>
</body>
</html>

services:
  web:
    image: nginx:1.27-alpine
    depends_on:
      - chain-server
      - diary-server
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  chain-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.game
    environment:
      CHAIN_ROOMS_FILE: /app/runtime/chain_rooms.json
    volumes:
      - ./runtime/game:/app/runtime
      - ./game/models:/app/game/models:ro
    restart: unless-stopped

  diary-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.diary
    environment:
      DISHU_APARTMENT_HOST: 0.0.0.0
      DISHU_APARTMENT_PORT: "8000"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
    volumes:
      - ./game/models:/app/game/models:ro
    restart: unless-stopped
